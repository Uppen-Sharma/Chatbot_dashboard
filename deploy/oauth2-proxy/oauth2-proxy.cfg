# oauth2-proxy config — TorayDemo Azure AD
# Fill in client_secret and cookie_secret before running.

# Azure AD provider
provider        = "oidc"
oidc_issuer_url = ""
client_id       = ""

# Get from: Azure Portal → TorayDemo → Certificates & secrets → Value column
client_secret = "PASTE_CLIENT_SECRET_HERE"

# Generate with: openssl rand -base64 32
cookie_secret   = "PASTE_GENERATED_COOKIE_SECRET_HERE"
cookie_secure   = true
cookie_httponly = true
cookie_samesite = "lax"
cookie_name     = "_toray_oauth2"

# Update to your real domain
redirect_url          = ""
relative_redirect_url = true

# Only allow logins from this domain
email_domains = [""]

# Inject user identity headers into FastAPI requests
pass_user_headers = true
pass_access_token = true
set_xauthrequest  = true

# Network
http_address = "0.0.0.0:4180"
upstreams    = ["http://localhost:5000"]

silence_ping_logging = true
