# NGINX config — TorayDemo Chatbot Dashboard
# Place at: /etc/nginx/sites-available/toray-dashboard
# Symlink:  ln -s /etc/nginx/sites-available/toray-dashboard /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourapp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourapp.com;

    ssl_certificate     /etc/ssl/certs/yourapp.com.crt;
    ssl_certificate_key /etc/ssl/private/yourapp.com.key;

    # oauth2-proxy handles login/callback routes
    location /oauth2/ {
        proxy_pass       http://localhost:4180;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Scheme                $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # Internal endpoint NGINX uses to validate the session cookie
    location = /oauth2/auth {
        proxy_pass       http://localhost:4180;
        proxy_set_header Host           $host;
        proxy_set_header X-Real-IP      $remote_addr;
        proxy_set_header X-Scheme       $scheme;
        proxy_set_header Content-Length "";
        proxy_pass_request_body         off;
    }

    # FastAPI — validate session, inject user headers, forward request
    location /api/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in;

        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;

        proxy_set_header X-Auth-Request-User  $user;
        proxy_set_header X-Auth-Request-Email $email;

        proxy_pass       http://localhost:5000;
        proxy_set_header Host $host;
    }

    # React frontend — auth-gated, serves built app
    location / {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in;

        root      /var/www/toray-dashboard/dist;
        try_files $uri $uri/ /index.html;
    }
}
